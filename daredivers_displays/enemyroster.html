<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DareDivers — Enemy Roster</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Permanent+Marker&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #eae3d2;
    --paper-mid: #d8cfb8;
    --paper-dark: #c4b898;
    --ink: #1a1208;
    --ink-light: #382a18;
    --ink-faded: #7a6845;
    --red-ink: #7a1a1a;
    --blue-ink: #18304a;
    --pencil: #52463a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    font-family: 'Libre Baskerville', serif;
  }

  .sheet {
    width: 1000px;
    background: var(--paper);
    position: relative;
    box-shadow: 0 4px 12px rgba(0,0,0,.4), 0 20px 60px rgba(0,0,0,.6);
    overflow: hidden;
  }

  /* ruled lines */
  .sheet::before {
    content:'';
    position:absolute; inset:0;
    background-image: repeating-linear-gradient(
      180deg, transparent, transparent 27px,
      rgba(100,85,55,.08) 27px, rgba(100,85,55,.08) 28px
    );
    pointer-events:none; z-index:0;
  }
  /* vignette */
  .sheet::after {
    content:'';
    position:absolute; inset:0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(20,12,4,.14) 100%);
    pointer-events:none; z-index:50;
  }

  /* ── HEADER ── */
  .header {
    position:relative; z-index:10;
    padding: 24px 36px 18px;
    border-bottom: 2px solid rgba(26,18,8,.12);
    display:flex; align-items:flex-end; justify-content:space-between;
  }
  .header-left { display:flex; align-items:flex-end; gap:18px; }
  .sheet-num {
    font-family:'Permanent Marker',cursive;
    font-size:88px; color:rgba(26,18,8,.05);
    line-height:1; position:absolute; left:28px; top:6px;
    user-select:none; pointer-events:none;
  }
  .sheet-title {
    font-family:'Permanent Marker',cursive;
    font-size:40px; color:var(--ink);
    line-height:1; position:relative; z-index:1;
    letter-spacing:-1px;
  }
  .sheet-meta {
    display:flex; flex-direction:column; gap:2px;
    padding-bottom:4px; position:relative; z-index:1;
  }
  .sheet-sub {
    font-family:'Caveat',cursive; font-size:15px;
    color:var(--blue-ink); font-weight:600;
    letter-spacing:1px; text-transform:uppercase;
  }
  .sheet-detail {
    font-family:'Libre Baskerville',serif; font-size:10px;
    color:var(--ink-faded); font-style:italic;
  }
  .header-tag {
    font-family:'Caveat',cursive; font-size:11px;
    color:var(--ink-faded); letter-spacing:3px;
    text-transform:uppercase; opacity:.7;
  }

  /* ── STAGE: overlapping enemies ── */
  .stage-wrap {
    position:relative; z-index:10;
    padding: 32px 0 0;
    display:flex; flex-direction:column; align-items:center;
  }

  .stage-label {
    font-family:'Caveat',cursive; font-size:11px;
    color:var(--ink-faded); letter-spacing:3px;
    text-transform:uppercase; margin-bottom:12px; align-self:flex-start;
    padding-left:36px;
  }

  /* Ocean floor strip */
  .ocean-stage {
    width:100%;
    height:240px;
    position:relative;
    background: linear-gradient(180deg, rgba(10,22,48,0) 0%, rgba(10,22,48,.06) 100%);
    border-top: 1px solid rgba(26,18,8,.08);
    border-bottom: 2px solid rgba(26,18,8,.18);
    overflow:hidden;
    display:flex; align-items:flex-end;
  }

  /* sandy floor texture */
  .ocean-stage::after {
    content:'';
    position:absolute; bottom:0; left:0; right:0; height:18px;
    background: repeating-linear-gradient(90deg,
      rgba(180,155,100,.18) 0px, rgba(180,155,100,.18) 3px,
      transparent 3px, transparent 8px
    );
    border-top: 1px solid rgba(140,110,60,.2);
  }

  /* shadow line on floor */
  .floor-shadow {
    position:absolute; bottom:18px; left:0; right:0; height:8px;
    background: linear-gradient(180deg, rgba(26,18,8,.08), transparent);
  }

  /* individual enemy slot */
  .enemy-slot {
    position:absolute;
    bottom: 18px;
    display:flex; flex-direction:column; align-items:center;
    cursor:default;
    transition: transform .2s ease;
  }
  .enemy-slot:hover { transform: translateY(-6px); z-index:20 !important; }

  .enemy-canvas {
    image-rendering:pixelated;
    image-rendering:crisp-edges;
    display:block;
  }

  /* name tag below each enemy */
  .enemy-nametag {
    font-family:'Caveat',cursive;
    font-size:12px; color:var(--ink-light);
    margin-top:4px; white-space:nowrap;
    background: rgba(234,227,210,.85);
    padding: 1px 6px; border-radius:2px;
    border:1px solid rgba(26,18,8,.12);
    position:relative; z-index:5;
  }

  /* ── GRID: enemy detail cards ── */
  .cards-section {
    position:relative; z-index:10;
    padding: 28px 36px 32px;
  }

  .cards-label {
    font-family:'Caveat',cursive; font-size:11px;
    color:var(--ink-faded); letter-spacing:3px;
    text-transform:uppercase; margin-bottom:16px;
    border-bottom:1px solid rgba(26,18,8,.1); padding-bottom:6px;
  }

  .cards-grid {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:16px;
  }

  .card {
    background: rgba(255,255,255,.28);
    border:1px solid rgba(26,18,8,.14);
    padding:14px 12px 12px;
    position:relative;
    transition: box-shadow .2s, transform .2s;
  }
  .card:hover {
    box-shadow: 3px 4px 14px rgba(26,18,8,.14);
    transform: translateY(-2px) rotate(.3deg);
  }
  /* corner fold */
  .card::after {
    content:'';
    position:absolute; bottom:0; right:0;
    width:14px; height:14px;
    background: linear-gradient(225deg, var(--paper-dark) 50%, transparent 50%);
  }

  .card-sprite-wrap {
    width:80px; height:80px;
    margin:0 auto 10px;
    display:flex; align-items:center; justify-content:center;
    background: rgba(255,255,255,.3);
    border:1px dashed rgba(26,18,8,.15);
    position:relative;
  }
  /* sketch corner marks */
  .card-sprite-wrap::before,
  .card-sprite-wrap::after {
    content:'';
    position:absolute;
    width:10px; height:10px;
    border-color:rgba(26,18,8,.3); border-style:solid;
  }
  .card-sprite-wrap::before { top:3px; left:3px; border-width:1.5px 0 0 1.5px; }
  .card-sprite-wrap::after  { bottom:3px; right:3px; border-width:0 1.5px 1.5px 0; background:none; }

  .card-canvas {
    image-rendering:pixelated;
    image-rendering:crisp-edges;
  }

  .card-name {
    font-family:'Permanent Marker',cursive;
    font-size:14px; color:var(--ink);
    text-align:center; margin-bottom:3px;
  }

  .card-frames {
    font-family:'Caveat',cursive; font-size:11px;
    color:var(--ink-faded); text-align:center;
    text-transform:uppercase; letter-spacing:1px;
    margin-bottom:6px;
  }

  /* frame dots */
  .frame-dots {
    display:flex; justify-content:center; gap:4px; margin-top:4px;
  }
  .fdot {
    width:5px; height:5px; border-radius:50%;
    background:rgba(26,18,8,.15);
    transition:background .1s;
  }
  .fdot.on { background:var(--ink-light); }

  /* ── FOOTER ── */
  .footer {
    position:relative; z-index:10;
    padding:10px 36px;
    border-top:1px solid rgba(26,18,8,.1);
    display:flex; justify-content:space-between; align-items:center;
  }
  .footer-note {
    font-family:'Caveat',cursive; font-size:13px;
    color:var(--red-ink); font-style:italic;
    transform:rotate(-.8deg); display:inline-block; opacity:.8;
  }
  .footer-pg {
    font-family:'Caveat',cursive; font-size:11px;
    color:var(--ink-faded); opacity:.5;
  }

  /* watermark */
  .watermark {
    position:absolute; bottom:60px; left:50%;
    transform:translateX(-50%) rotate(-6deg);
    font-family:'Permanent Marker',cursive;
    font-size:90px; color:rgba(26,18,8,.025);
    white-space:nowrap; user-select:none; pointer-events:none; z-index:1;
  }
</style>
</head>

// ── Display sizes for stage (scale up nicely) ──
const STAGE_SCALE = {
  'Anglerfish': 2.2,
  'Jellyfish':  2.0,
  'Lionfish':   2.0,
  'Octopus':    2.2,
  'Pirate A':   2.2,
  'Pirate B':   2.2,
  'Shark':      1.4,
  'Squid':      2.2,
};

// Staggered vertical positions so they feel natural
const STAGE_Y = [0, 8, -4, 12, 4, -8, 0, 6];

// Overlap: place them so they slightly overlap
const images = [];
let loaded = 0;

ENEMIES.forEach((e, i) => {
  const img = new Image();
  img.onload = () => {
    images[i] = img;
    loaded++;
    if (loaded === ENEMIES.length) buildAll();
  };
  img.src = e.src;
});

function buildAll() {
  buildStage();
  buildCards();
}

function buildStage() {
  const stage = document.getElementById('ocean-stage');
  const stageW = stage.offsetWidth;
  const n = ENEMIES.length;
  const padding = 90;
  const usableW = stageW - padding * 2;
  const slotW = Math.floor(usableW / (n - 1));

  ENEMIES.forEach((e, i) => {
    const img = images[i];
    const scale = STAGE_SCALE[e.name] || 2;
    const dispW = e.fw * scale;
    const dispH = e.fh * scale;

    const slot = document.createElement('div');
    slot.className = 'enemy-slot';
    const xPos = padding + i * slotW;
    slot.style.left = (xPos - dispW / 2) + 'px';
    slot.style.bottom = (18 + STAGE_Y[i]) + 'px';
    slot.style.zIndex = i + 1;

    const canvas = document.createElement('canvas');
    canvas.width = e.fw;
    canvas.height = e.fh;
    canvas.className = 'enemy-canvas';
    canvas.style.width = dispW + 'px';
    canvas.style.height = dispH + 'px';

    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const tag = document.createElement('div');
    tag.className = 'enemy-nametag';
    tag.textContent = e.name;

    slot.appendChild(canvas);
    slot.appendChild(tag);
    stage.appendChild(slot);

    // animate
    let frame = 0;
    const offset = i * 80; // stagger start
    function draw() {
      ctx.clearRect(0, 0, e.fw, e.fh);
      ctx.drawImage(img, frame * e.fw, 0, e.fw, e.fh, 0, 0, e.fw, e.fh);
    }
    draw();
    setTimeout(() => {
      setInterval(() => {
        frame = (frame + 1) % e.frames;
        draw();
      }, 140);
    }, offset);
  });
}

function buildCards() {
  const grid = document.getElementById('cards-grid');

  ENEMIES.forEach((e, i) => {
    const img = images[i];

    const card = document.createElement('div');
    card.className = 'card';

    // sprite wrap
    const wrap = document.createElement('div');
    wrap.className = 'card-sprite-wrap';

    const canvas = document.createElement('canvas');
    canvas.width = e.fw;
    canvas.height = e.fh;
    canvas.className = 'card-canvas';
    // fit inside 60x60 area
    const maxDim = 60;
    const scaleC = Math.min(maxDim / e.fw, maxDim / e.fh);
    canvas.style.width  = (e.fw * scaleC) + 'px';
    canvas.style.height = (e.fh * scaleC) + 'px';

    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    wrap.appendChild(canvas);

    // name
    const name = document.createElement('div');
    name.className = 'card-name';
    name.textContent = e.name;

    // frame count label
    const framesLbl = document.createElement('div');
    framesLbl.className = 'card-frames';
    framesLbl.textContent = e.frames + ' frames';

    // dots
    const dotsWrap = document.createElement('div');
    dotsWrap.className = 'frame-dots';
    const dots = [];
    for (let d = 0; d < e.frames; d++) {
      const dot = document.createElement('div');
      dot.className = 'fdot' + (d === 0 ? ' on' : '');
      dots.push(dot);
      dotsWrap.appendChild(dot);
    }

    card.appendChild(wrap);
    card.appendChild(name);
    card.appendChild(framesLbl);
    card.appendChild(dotsWrap);
    grid.appendChild(card);

    // animate card
    let frame = 0;
    const cardOffset = i * 60;
    function drawCard() {
      ctx.clearRect(0, 0, e.fw, e.fh);
      ctx.drawImage(img, frame * e.fw, 0, e.fw, e.fh, 0, 0, e.fw, e.fh);
      dots.forEach((d, di) => d.classList.toggle('on', di === frame));
    }
    drawCard();
    setTimeout(() => {
      setInterval(() => {
        frame = (frame + 1) % e.frames;
        drawCard();
      }, 140);
    }, cardOffset);
  });
}
